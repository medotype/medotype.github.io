<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeDoType | Results</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0e0e0f;
            --card-bg: #1e1e1f;
            --text-faded: #646669;
            --text-bright: #d1d0c5;
            --accent: #3b82f6;
            --font: 'Inter', sans-serif;
            --success: #10b981;
        }

        body {
            background-color: transparent;
            color: var(--text-bright);
            font-family: var(--font);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .results-card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 24px;
            width: 90%;
            max-width: 360px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stat-label { color: var(--text-faded); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.15em; margin: 0; }
        .stat-val { font-size: 5.5rem; font-weight: 600; color: var(--accent); margin: 0.2rem 0; text-shadow: 0 0 30px rgba(59, 130, 246, 0.2); }
        .acc-val { color: var(--text-bright); font-size: 1.2rem; margin-bottom: 2rem; font-weight: 400; }

        .status-msg { font-size: 0.8rem; margin-bottom: 1.5rem; padding: 8px; border-radius: 8px; width: 100%; box-sizing: border-box; }
        .msg-saved { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .msg-guest { background: rgba(100, 102, 105, 0.1); color: var(--text-faded); }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-family: var(--font);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }

        .btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 1px solid var(--text-faded); color: var(--text-faded); margin-top: 12px; }
        .btn-outline:hover { border-color: var(--text-bright); color: var(--text-bright); }
    </style>
</head>
<body>

    <div class="results-card">
        <p class="stat-label">Words Per Minute</p>
        <h1 class="stat-val" id="wpm">0</h1>
        <p class="acc-val" id="acc">ACC: 0%</p>

        <div id="status-container" class="status-msg">Checking status...</div>
        <div id="action-area"></div>
    </div>

    <script>
        const SB_URL = 'https://tzaowqeofmwfnprrfwat.supabase.co';
        const SB_KEY = 'sb_publishable_Sr33ux9FL6QZaJlfhjoqFw_tIwQhSbx';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function initResults() {
            const params = new URLSearchParams(window.location.search);
            const wpm = params.get('wpm') || 0;
            const acc = params.get('acc') || 0;
            const mode = (params.get('mode') || 'time_15').replace('_', ' ');
            const isSaved = params.get('saved') === 'true';

            document.getElementById('wpm').innerText = wpm;
            document.getElementById('acc').innerText = `ACCURACY: ${acc}%`;

            const statusBox = document.getElementById('status-container');
            const actionArea = document.getElementById('action-area');

            if (isSaved) {
                statusBox.innerText = `✓ Score saved to your ${mode} profile`;
                statusBox.className = "status-msg msg-saved";
                actionArea.innerHTML = `<button class="btn" onclick="location.href='home.html'">Next Test</button>`;
            } else {
                statusBox.innerText = "⚠ Score not saved. Sign up to track progress.";
                statusBox.className = "status-msg msg-guest";
                actionArea.innerHTML = `
                    <button class="btn" onclick="location.href='account.html'">Login to Save</button>
                    <button class="btn btn-outline" onclick="location.href='home.html'">Skip & Retry</button>
                `;
            }
        }

        initResults();
        window.addEventListener('keydown', (e) => { if (e.key === 'Enter') location.href = 'home.html'; });
    </script>
</body>
</html>
