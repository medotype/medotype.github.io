<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeDoType | Account</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0e0e0f;
            --card-bg: #1e1e1f;
            --text-faded: #646669;
            --text-bright: #d1d0c5;
            --accent: #3b82f6;
            --error: #ef4444;
            --font: 'Inter', sans-serif;
        }

        body {
            background-color: transparent;
            color: var(--text-bright);
            font-family: var(--font);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Wide horizontal container */
        .auth-container {
            background: var(--card-bg);
            padding: 1.5rem 2.5rem;
            border-radius: 16px;
            width: 95%;
            max-width: 900px;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        /* Left side: Branding & Toggle */
        .brand-side {
            flex: 1;
            text-align: left;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding-right: 2rem;
        }

        .brand-side h2 { margin: 0; font-size: 1.8rem; letter-spacing: -0.03em; }
        .brand-side p { color: var(--text-faded); font-size: 0.9rem; margin: 0.5rem 0 1.5rem; }

        /* Right side: The actual form fields */
        .form-side {
            flex: 2;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
        }

        .input-wrap {
            flex: 1;
            min-width: 180px;
            text-align: left;
            transition: all 0.3s ease;
        }

        .input-wrap.hidden {
            display: none; /* In wide mode, display:none is cleaner than scaling */
        }

        label { 
            display: block; 
            font-size: 0.7rem; 
            color: var(--text-faded); 
            margin-bottom: 0.4rem; 
            text-transform: uppercase; 
            letter-spacing: 0.05em; 
        }
        
        input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            color: white;
            font-family: var(--font);
            font-size: 0.9rem;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        .btn {
            padding: 11px 24px;
            border-radius: 8px;
            border: none;
            font-family: var(--font);
            font-weight: 600;
            background: var(--accent);
            color: white;
            cursor: pointer;
            white-space: nowrap;
        }

        .toggle-btn {
            background: transparent;
            color: var(--accent);
            border: none;
            cursor: pointer;
            padding: 0;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: underline;
        }

        #msg { 
            width: 100%; 
            margin-top: 0.5rem; 
            font-size: 0.8rem; 
            min-height: 1rem; 
        }
        .err { color: var(--error); }
        .success { color: #10b981; }

        /* Responsive snap back for tiny iframes */
        @media (max-width: 700px) {
            .auth-container { flex-direction: column; text-align: center; gap: 1rem; }
            .brand-side { border-right: none; padding-right: 0; }
            .form-side { flex-direction: column; width: 100%; }
            .input-wrap { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="brand-side">
            <h2 id="title">MeDoType</h2>
            <p id="subtitle">Track your speed and progress.</p>
            <button class="toggle-btn" onclick="manualToggle()" id="mode-hint">
                Already a member? Login
            </button>
        </div>

        <div class="form-side">
            <div class="input-wrap">
                <label>Email</label>
                <input type="email" id="email" placeholder="you@example.com">
            </div>

            <div id="username-wrap" class="input-wrap">
                <label>Username</label>
                <input type="text" id="username" placeholder="Typist123">
            </div>

            <div class="input-wrap">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <button class="btn" id="main-btn" onclick="handleAuth()">Go</button>
            
            <p id="msg"></p>
        </div>
    </div>

    <script>
        const SB_URL = 'https://tzaowqeofmwfnprrfwat.supabase.co';
        const SB_KEY = 'sb_publishable_Sr33ux9FL6QZaJlfhjoqFw_tIwQhSbx';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let isLogin = false; 
        let isCooldown = false;

        function setMode(loginMode) {
            isLogin = loginMode;
            const userWrap = document.getElementById('username-wrap');
            const title = document.getElementById('title');
            const subtitle = document.getElementById('subtitle');
            const btn = document.getElementById('main-btn');
            const hint = document.getElementById('mode-hint');

            if (isLogin) {
                userWrap.classList.add('hidden');
                title.innerText = "Welcome Back";
                subtitle.innerText = "Pick up where you left off.";
                btn.innerText = "Login";
                hint.innerText = "Need an account? Sign Up";
            } else {
                userWrap.classList.remove('hidden');
                title.innerText = "MeDoType";
                subtitle.innerText = "Track your speed and progress.";
                btn.innerText = "Sign Up";
                hint.innerText = "Already a member? Login";
            }
        }

        function manualToggle() { setMode(!isLogin); }
        setMode(false);

        async function handleAuth() {
            if (isCooldown) return;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const username = document.getElementById('username').value;
            const msgEl = document.getElementById('msg');

            if (!email || !password || (!isLogin && !username)) {
                msgEl.innerText = "Fill all fields.";
                msgEl.className = 'err';
                return;
            }

            isCooldown = true;
            msgEl.innerText = "Working...";
            msgEl.className = "";

            let result;
            if (isLogin) {
                result = await _supabase.auth.signInWithPassword({ email, password });
            } else {
                result = await _supabase.auth.signUp({ 
                    email, password, 
                    options: { data: { username } } 
                });
            }

            if (result.error) {
                msgEl.innerText = result.error.message;
                msgEl.className = 'err';
                isCooldown = false;
            } else {
                msgEl.innerText = isLogin ? 'Success!' : 'Check your email!';
                msgEl.className = 'success';
                setTimeout(() => window.location.href = 'home.html', 1000);
            }
        }
    </script>
</body>
</html>
