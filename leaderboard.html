<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeDoType | Leaderboard</title>
    <link rel="stylesheet" href="data/css/root.css">
    <style>
        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            background-color: transparent; /* Allows index.html bg to show through if needed */
        }

        .settings-placeholder {
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-box {
            font-size: 4rem;
            color: var(--accent);
            margin-bottom: 1.5rem;
            display: inline-block;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
        }

        h1 {
            font-weight: 600;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        p {
            color: var(--text-faded);
            font-size: 1rem;
            max-width: 300px;
            line-height: 1.5;
            margin: 0 auto;
        }

        .badge {
            display: inline-block;
            margin-top: 2rem;
            padding: 6px 12px;
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent);
            font-weight: 600;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="settings-placeholder">
        <div class="icon-box">
            <i class="fa-solid fa-gears"></i>
        </div>
        <h1>Leaderboard</h1>
        <p>Competing for top typing scores is in development.</p>
        
        <div class="badge">Coming Soon</div>
    </div>

</body>
</html>
