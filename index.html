<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeDoType | Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #121213;
            --card-bg: #1e1e1f;
            --text-faded: #565656;
            --text-bright: #ffffff;
            --accent: #3b82f6;
            --font: 'Inter', sans-serif;
            --nav-height: 60px;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg);
            font-family: var(--font);
            color: var(--text-bright);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header Styling */
        header {
            height: var(--nav-height);
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            border-bottom: 1px solid var(--card-bg);
            z-index: 10;
        }

        .logo {
            font-weight: 600;
            font-size: 1.2rem;
            letter-spacing: -0.02em;
            color: var(--accent);
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .nav-links a {
            color: var(--text-faded);
            text-decoration: none;
            font-size: 1.1rem;
            transition: color 0.2s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--text-bright);
        }

        /* Iframe Container */
        .content-wrapper {
            flex: 1;
            width: 100%;
            border: none;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Footer Styling */
        footer {
            height: 40px;
            background-color: var(--bg);
            border-top: 1px solid var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            color: var(--text-faded);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .footer-accent {
            color: var(--accent);
            margin: 0 4px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">MeDoType</div>
        <nav class="nav-links">
            <a href="#" class="active" title="Home"><i class="fa-solid fa-keyboard"></i></a>
            <a href="#" title="Statistics"><i class="fa-solid fa-clipboard-list"></i></a>
            <a href="#" title="Account"><i class="fa-solid fa-user"></i></a>
        </nav>
    </header>

    <main class="content-wrapper">
        <iframe src="home.html" title="loadedpage"></iframe>
    </main>

    <footer>
        &copy; 2026 <span class="footer-accent">MeDoType</span> | Minimalist Typing Tool
    </footer>

</body>
</html>
