<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeDoType</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="data/css/index.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico?v=1">
</head>
    
    <style>
    .search-container {
        flex: 0 1 300px;
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 10px;
        display: flex;
        align-items: center;
        padding: 0 15px;
        margin: 0 20px;
        transition: 0.2s;
    }
    .search-container:focus-within {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
    }
    .search-container i {
        color: var(--text-faded);
        font-size: 0.9rem;
    }
    .search-container input {
        background: transparent;
        border: none;
        color: var(--text-bright);
        padding: 10px;
        width: 100%;
        outline: none;
        font-family: var(--font);
        font-size: 0.9rem;
    }
</style>
    
<body>

    <header>
        <div class="brand" onclick="navigateFrame('home.html', this)">
            <i class="fa-solid fa-keyboard"></i>
            <span class="logo-text">MeDoType</span>
        </div>

        <div class="search-container">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="global-search" placeholder="search typists..." 
               onkeypress="if(event.key === 'Enter') handleGlobalSearch()">
    </div>
        
        <nav class="nav-links">
            <a onclick="navigateFrame('pages/home.html', this)" class="active" title="Home">
                <i class="fa-solid fa-house"></i>
            </a>
            <a onclick="navigateFrame('pages/data.html', this)" title="Statistics">
                <i class="fa-solid fa-clipboard-check"></i>
            </a>
            <a onclick="navigateFrame('pages/leaderboard.html', this)" title="Leaderboard">
                <i class="fa-solid fa-trophy"></i>
            </a>
            <a onclick="navigateFrame('pages/settings.html', this)" title="Settings">
                <i class="fa-solid fa-gear"></i>
            </a>
            <a onclick="navigateFrame('pages/account.html', this)" title="Account">
                <i class="fa-solid fa-circle-user"></i>
            </a>
        </nav>
    </header>

    <main class="content-wrapper">
        <iframe id="main-frame" src="pages/home.html" title="Loading..."></iframe>
    </main>

    <footer>
        <div class="footer-left">
            <span>&copy; 2026 <span class="footer-accent">MeDoType</span></span>
            <span><span class="key-hint">esc</span> - reset</span>
        </div>
        <div class="footer-right">
            v0.1
        </div>
    </footer>

    <script src="data/js/index.js"></script>

    <script>
    function handleGlobalSearch() {
        const query = document.getElementById('global-search').value.trim();
        if (query) {
            const url = `pages/loadprofile.html?username=${encodeURIComponent(query)}`;
            navigateFrame(url, { tagName: 'SEARCH' }); 
            document.getElementById('global-search').value = ''; 
        }
    }
</script>
    
</body>
</html>
