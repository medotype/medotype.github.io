<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeDoType | Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../data/css/root.css">
    <script src="../data/js/theme.js"></script>
    <style>
        body { 
            background-color: var(--bg); 
            color: var(--text-bright); 
            font-family: var(--font); 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden;
        }

        #menu-container {
            width: 100%;
            max-width: 1000px;
            padding: 2rem;
            text-align: center;
        }

        .header-meta {
            color: var(--text-faded);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 3rem;
            animation: fadeIn 0.8s ease;
        }

        /* Unified Grid Structure */
        .modes-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            animation: fadeIn 1s ease;
        }

        .mode-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: 60px 30px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
        }

        /* Hover States */
        .mode-card:not(.locked):hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--accent);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .mode-card i {
            font-size: 2.5rem;
            color: var(--text-faded);
            margin-bottom: 1.5rem;
            transition: 0.3s;
        }

        .mode-card h2 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-bright);
            letter-spacing: -0.01em;
        }

        .mode-card p {
            margin-top: 12px;
            font-size: 0.9rem;
            color: var(--text-faded);
            line-height: 1.6;
            font-weight: 300;
        }

        .mode-card:not(.locked):hover i {
            color: var(--accent);
            transform: scale(1.1);
        }

        /* Locked State Updates */
        .mode-card.locked {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(0.8);
        }

        /* Animated underline on hover */
        .mode-card::after {
            content: '';
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: var(--accent);
            border-radius: 2px;
            transition: 0.3s ease;
            opacity: 0;
        }

        .mode-card:not(.locked):hover::after {
            width: 40px;
            opacity: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive handling */
        @media (max-width: 900px) {
            .modes-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            body { height: auto; padding: 4rem 0; overflow-y: auto; }
            .modes-grid {
                grid-template-columns: 1fr;
                max-width: 400px;
                margin: 0 auto;
            }
        }
    </style>
</head>
<body>

    <div id="menu-container">
        <div class="header-meta">Select Gamemode</div>
        
        <div class="modes-grid">
            <a href="singleplayer/home.html" class="mode-card">
                <i class="fa-solid fa-user"></i>
                <h2>Singleplayer</h2>
                <p>Standard typing test with customizable modes and personal bests.</p>
            </a>

            <a href="practice/home.html" class="mode-card">
                <i class="fa-solid fa-dumbbell"></i>
                <h2>Practice</h2>
                <p>Sharpen your speed with infinite typing and live combo tracking.</p>
            </a>

            <div class="mode-card locked">
                <i class="fa-solid fa-lock"></i>
                <h2>Ranked</h2>
                <p>Competitive matchmaking and global leaderboards. Coming soon.</p>
            </a>
        </div>
    </div>

</body>
</html>
