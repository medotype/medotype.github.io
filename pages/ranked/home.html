
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeDoType | Ranked</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #121213;
            --bg-glow: #1a1a24;
            --card-bg: #1e1e1f;
            --text-faded: #565656;
            --text-bright: #ffffff;
            --accent: #3b82f6;
            --accent-hover: #3b83eb;
            --ranked-grad: #3b82f6;
            --font: 'Inter', sans-serif;
            --error: #ef4444;
        }

        body {
            background: radial-gradient(circle at center, var(--bg-glow) 0%, var(--bg) 70%);
            color: var(--text-bright);
            font-family: var(--font);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Custom Client-Side Error Toast */
        #error-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translate(-50%, -150px);
            background: var(--error);
            color: white;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.4);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 100;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #error-toast.show {
            transform: translate(-50%, 0);
        }

        .center-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            animation: floatUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .season-tag {
            color: var(--text-faded);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .ranked-title {
            font-size: 3rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.05em;
            background: var(--ranked-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(139, 92, 246, 0.2);
        }

        .rank-display {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px 30px;
            border-radius: 50px;
            margin-top: 20px;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(10px);
        }

        .rank-icon { color: #8b5cf6; font-size: 1.5rem; }
        .rank-text { font-weight: 600; font-size: 1.2rem; }
        .elo-text {
            color: var(--text-faded);
            font-size: 0.9rem;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            padding-left: 15px;
        }

        .action-bar {
            position: absolute;
            bottom: 40px;
            left: 40px;
            display: flex;
            gap: 15px;
            z-index: 10;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 16px 32px;
            border-radius: 14px;
            border: none;
            font-family: var(--font);
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* Restored Hover Animations */
        .btn-play { 
            background: var(--accent); 
            color: white; 
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3); 
            animation: slideIn 0.6s ease forwards;
        }
        
        .btn-play:hover { 
            transform: translateY(-4px) scale(1.02); 
            background: var(--accent-hover); 
            box-shadow: 0 12px 35px rgba(59, 130, 246, 0.5);
        }

        .btn-play:active {
            transform: translateY(0) scale(0.98);
        }

        .btn-shop { 
            background: var(--card-bg); 
            color: var(--text-bright); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            animation: slideIn 0.8s ease forwards;
        }

        .btn-shop:not(.btn-locked):hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-4px);
        }

        .btn-shop:active {
            transform: translateY(0);
        }

        .btn-cancel { 
            background: var(--error) !important; 
            box-shadow: 0 8px 25px rgba(239, 68, 68, 0.3) !important; 
        }
        
        .btn-cancel:hover {
            background: #dc2626 !important;
            box-shadow: 0 12px 35px rgba(239, 68, 68, 0.5) !important;
        }

        /* Lock Overlay Logic */
        .icon-wrapper {
            position: relative;
            display: inline-flex;
        }

        .lock-badge {
            position: absolute;
            bottom: -6px;
            right: -8px;
            font-size: 0.75rem;
            color: var(--error);
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .btn-locked {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none; /* Physically prevents clicks */
            filter: grayscale(0.8);
            transform: scale(0.95);
        }

        /* Show the lock badge only when locked */
        .btn-locked .lock-badge {
            opacity: 1;
            transform: scale(1);
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(59, 130, 246, 0.2);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        
        @keyframes floatUp {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        #queue-status {
            animation: fadeInStatus 0.4s ease-out;
        }

        @keyframes fadeInStatus {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="error-toast">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span id="error-text">Error message goes here</span>
    </div>

    <div class="center-stage">
        <div class="season-tag">Season 1</div>
        <h1 class="ranked-title">MeDoType RANKED</h1>
<div class="rank-display" id="rank-display" style="visibility: hidden;">
    <i id="rank-icon" class="fa-solid fa-circle-question rank-icon"></i>
    <span id="rank-text" class="rank-text">Unranked</span>
    <span id="elo-text" class="elo-text">0 Elo</span>
</div>

    <div id="queue-status" style="position: absolute; bottom: 110px; left: 45px; display: none; align-items: center; gap: 12px;">
        <div class="spinner"></div>
        <div style="display: flex; flex-direction: column;">
            <span style="font-size: 0.7rem; color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em;">Searching for match...</span>
            <span id="queue-timer" style="font-size: 1.2rem; font-weight: 600; font-variant-numeric: tabular-nums;">00:00</span>
        </div>
    </div>

    <div class="action-bar">
        <button class="btn btn-play" id="main-btn" onclick="handleQueue()">
            <i class="fa-solid fa-play" id="btn-icon"></i> <span id="btn-text">Find Match</span>
        </button>
        <button class="btn btn-shop" id="shop-btn">
            <span class="icon-wrapper">
                <i class="fa-solid fa-cart-shopping" id="shop-icon"></i>
                <i class="fa-solid fa-lock lock-badge"></i>
            </span>
            Shop
        </button>
    </div>

    <script>
        const SB_URL = 'https://tzaowqeofmwfnprrfwat.supabase.co';
        const SB_KEY = 'sb_publishable_Sr33ux9FL6QZaJlfhjoqFw_tIwQhSbx';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let isQueueing = false;
        let queueInterval;
        let seconds = 0;
        let queueId = null;
        let queueSubscription = null;
        let errorTimeout;

        // Custom Error Alert Function
        function showError(message) {
            const toast = document.getElementById('error-toast');
            document.getElementById('error-text').innerText = message;
            
            toast.classList.add('show');
            
            clearTimeout(errorTimeout);
            errorTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function startTimer() {
            seconds = 0;
            const timerDisplay = document.getElementById('queue-timer');
            queueInterval = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                const secs = (seconds % 60).toString().padStart(2, '0');
                timerDisplay.innerText = `${mins}:${secs}`;
            }, 1000);
        }

        function stopTimer() {
            clearInterval(queueInterval);
            document.getElementById('queue-timer').innerText = "00:00";
        }

        async function handleQueue() {
            const { data: { session } } = await _supabase.auth.getSession();
            

            if (!session) return showError("To play ranked, please log in.");

            const btn = document.getElementById('main-btn');
            const btnText = document.getElementById('btn-text');
            const btnIcon = document.getElementById('btn-icon');
            const statusDiv = document.getElementById('queue-status');
            const shopBtn = document.getElementById('shop-btn');

            isQueueing = !isQueueing;

            if (isQueueing) {
                btn.classList.add('btn-cancel');
                btnText.innerText = "Cancel Queue";
                btnIcon.className = "fa-solid fa-xmark";
                
                shopBtn.classList.add('btn-locked');
                
                statusDiv.style.display = 'flex';
                startTimer();

// Replace the insert block in handleQueue() with this:
const { data, error } = await _supabase
    .from('ranked_queue')
    .insert([{ 
        user_id: session.user.id, 
        username: session.user.user_metadata.username || "Player",
        elo: currentElo // Now using the server-fetched Elo
    }])
    .select();


                if (error) {
                    stopQueueUI();
                    return showError("Failed to join queue. Try again.");
                }
                queueId = data[0].id;

                queueSubscription = _supabase
                    .channel(`q_${queueId}`)
                    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'ranked_queue', filter: `id=eq.${queueId}` }, 
                    payload => {
                        if (payload.new.status === 'matched') matchFound(payload.new.match_id);
                    }).subscribe();

                checkNearbyPlayers(session.user.id);

            } else {
                stopQueueUI();
            }
        }

        async function stopQueueUI() {
            const btn = document.getElementById('main-btn');
            const btnText = document.getElementById('btn-text');
            const btnIcon = document.getElementById('btn-icon');
            const statusDiv = document.getElementById('queue-status');
            const shopBtn = document.getElementById('shop-btn');

            isQueueing = false;
            btn.classList.remove('btn-cancel');
            btnText.innerText = "Find Match";
            btnIcon.className = "fa-solid fa-play";
            
            // Unlock Shop UI
            shopBtn.classList.remove('btn-locked');
            
            statusDiv.style.display = 'none';
            stopTimer();

            if (queueId) {
                await _supabase.from('ranked_queue').delete().eq('id', queueId);
                queueId = null;
            }
            if (queueSubscription) _supabase.removeChannel(queueSubscription);
        }

        async function checkNearbyPlayers(myId) {
            const { data: opponents } = await _supabase
                .from('ranked_queue')
                .select('*')
                .eq('status', 'searching')
                .neq('user_id', myId)
                .order('created_at', { ascending: true })
                .limit(1);

            if (opponents && opponents.length > 0) {
                const opponent = opponents[0];
                const sharedMatchId = crypto.randomUUID();
                await _supabase.from('ranked_queue')
                    .update({ status: 'matched', match_id: sharedMatchId })
                    .in('id', [queueId, opponent.id]);
            }
        }

        function matchFound(matchId) {
            stopTimer();
            document.getElementById('btn-text').innerText = "MATCH FOUND!";
            document.getElementById('main-btn').style.background = "#10b981";
            setTimeout(() => { window.location.href = `game.html?id=${matchId}`; }, 2000);
        }
    </script>
</body>
</html>
