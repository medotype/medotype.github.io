<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeDoType | User Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../data/css/root.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: var(--bg); color: var(--text-bright); font-family: var(--font); margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 800px; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #msg { text-align: center; padding: 50px; color: var(--text-faded); font-style: italic; font-size: 1.2rem; }
        #profile-view { display: none; width: 100%; }

        .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 2.5rem; }
        .p-icon { font-size: 2rem; color: var(--accent); background: var(--card-bg); padding: 18px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.03); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .p-name { font-size: 2.2rem; font-weight: 600; margin: 0; letter-spacing: -0.03em; }
        .p-meta { color: var(--text-faded); font-size: 0.85rem; margin-top: 4px; font-weight: 400; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 2.5rem; }
        .stat-card { background: var(--card-bg); padding: 1.5rem; border-radius: 18px; text-align: center; border: 1px solid rgba(255,255,255,0.03); transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.08); }
        .stat-label { color: var(--text-faded); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em; display: block; margin-bottom: 10px; font-weight: 600; }
        .stat-value { font-size: 2rem; font-weight: 600; color: var(--accent); }

        .history-card { background: var(--card-bg); border-radius: 20px; padding: 1.5rem; border: 1px solid rgba(255,255,255,0.03); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 12px 15px; color: var(--text-faded); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid rgba(255,255,255,0.05); }
        td { padding: 14px 15px; border-bottom: 1px solid rgba(255,255,255,0.02); font-size: 0.95rem; }
        
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255,255,255,0.01); }

        .wpm-cell { color: var(--accent); font-weight: 600; }
        .mode-tag { text-transform: capitalize; opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <div id="msg">Loading profile...</div>

    <div id="profile-view">
        <div class="profile-header">
            <div class="p-icon"><i class="fa-solid fa-user"></i></div>
            <div>
                <h2 class="p-name" id="p-name">Username</h2>
                <div class="p-meta"><i class="fa-solid fa-calendar-days" style="font-size: 0.75rem; margin-right: 5px;"></i> <span id="p-joined">Member</span></div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">Best WPM</span>
                <div class="stat-value" id="best-wpm">-</div>
            </div>
            <div class="stat-card">
                <span class="stat-label">Avg Accuracy</span>
                <div class="stat-value" id="avg-acc">-</div>
            </div>
            <div class="stat-card">
                <span class="stat-label">Total Tests</span>
                <div class="stat-value" id="total-tests">-</div>
            </div>
        </div>

        <div class="history-card">
            <span class="stat-label" style="margin-left:5px">Last 10 Tests</span>
            <table>
                <thead>
                    <tr>
                        <th>Mode</th>
                        <th>WPM</th>
                        <th>Acc</th>
                        <th style="text-align:right">Date</th>
                    </tr>
                </thead>
                <tbody id="p-history"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const SB_URL = 'https://tzaowqeofmwfnprrfwat.supabase.co';
    const SB_KEY = 'sb_publishable_Sr33ux9FL6QZaJlfhjoqFw_tIwQhSbx';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    async function loadProfileFromURL() {
        const params = new URLSearchParams(window.location.search);
        const username = params.get('username');
        const view = document.getElementById('profile-view');
        const msg = document.getElementById('msg');

        if (!username) {
            msg.innerText = "No user specified.";
            return;
        }

        try {
            // 1. Find Profile by username
            const { data: profile, error: pErr } = await _supabase
                .from('profiles')
                .select('id, username, updated_at')
                .ilike('username', username)
                .single();

            if (pErr || !profile) {
                msg.innerText = `User "${username}" not found.`;
                return;
            }

            const { data: scores, error: sErr } = await _supabase
                .from('scores')
                .select('*')
                .eq('user_id', profile.id)
                .order('created_at', { ascending: false })
                .limit(10); 

            if (sErr) throw sErr;

            msg.style.display = 'none';
            view.style.display = 'block';
            document.getElementById('p-name').innerText = profile.username;
            
            const joinDate = new Date(profile.updated_at).toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('p-joined').innerText = `Joined ${joinDate}`;

            if (!scores || scores.length === 0) {
                document.getElementById('best-wpm').innerText = '0';
                document.getElementById('avg-acc').innerText = '0%';
                document.getElementById('total-tests').innerText = '0';
                document.getElementById('p-history').innerHTML = '<tr><td colspan="4" style="text-align:center; padding:40px; color:var(--text-faded)">No tests completed yet.</td></tr>';
                return;
            }

            const best = Math.max(...scores.map(s => s.wpm));
            const avgAcc = Math.round(scores.reduce((a, b) => a + b.accuracy, 0) / scores.length);
            
            document.getElementById('best-wpm').innerText = best;
            document.getElementById('avg-acc').innerText = avgAcc + '%';
            document.getElementById('total-tests').innerText = scores.length >= 10 ? '10+' : scores.length;

            const historyBody = document.getElementById('p-history');
            historyBody.innerHTML = '';
            
            scores.forEach(s => {
                const date = new Date(s.created_at).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
                const cleanMode = s.mode.replace(/_/g, ' ');
                
                historyBody.innerHTML += `
                    <tr>
                        <td class="mode-tag" style="color:var(--text-faded)">${cleanMode}</td>
                        <td class="wpm-cell">${s.wpm}</td>
                        <td>${s.accuracy}%</td>
                        <td style="text-align:right; color:var(--text-faded); font-size:0.8rem;">${date}</td>
                    </tr>
                `;
            });

        } catch (err) {
            console.error(err);
            msg.innerText = "Error loading profile.";
        }
    }

    window.onload = loadProfileFromURL;
</script>
</body>
</html>
