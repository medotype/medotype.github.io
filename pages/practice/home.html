<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeDoType | Practice</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../data/css/root.css">
    <script src="../../data/js/theme.js"></script>
    <style>
        body { background-color: var(--bg); color: var(--text-bright); font-family: var(--font); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #app { width: 100%; max-width: 850px; text-align: center; padding: 2rem; position: relative; }
        
        #live-stat { font-size: 1.2rem; font-weight: 300; color: var(--text-faded); margin-bottom: 1.5rem; height: 1.5rem; display: flex; justify-content: center; gap: 20px; }
        .stat-item { display: flex; gap: 8px; align-items: center; }
        .stat-item b { color: var(--accent); }

        #typing-viewport { height: 90px; overflow: hidden; position: relative; margin-bottom: 2rem; }
        #word-container { display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; align-items: center; position: relative; top: 0; transition: top 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .word { font-size: 2rem; font-weight: 400; color: var(--text-faded); letter-spacing: -0.02em; position: relative; }
        .word.active::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 100%; height: 2px; background: var(--accent); border-radius: 2px; opacity: 0.5; }
        .letter.correct { color: var(--text-bright); }
        .letter.incorrect { color: var(--error); border-bottom: 2px solid var(--error); }
        
        #restart-btn { margin-top: 2rem; background: var(--card-bg); color: var(--text-faded); border: none; padding: 10px 20px; border-radius: 10px; font-family: var(--font); font-weight: 600; cursor: pointer; transition: 0.2s; }
        #restart-btn:hover { color: var(--text-bright); }
    </style>
</head>
<body>

    <div id="app">
        <div id="live-stat">
            <div class="stat-item"><i class="fa-solid fa-bolt"></i> <span id="wpm-val">0</span> WPM</div>
            <div class="stat-item"><i class="fa-solid fa-font"></i> <span id="word-val">0</span> words</div>
        </div>

        <div id="typing-viewport">
            <div id="word-container"></div>
        </div>

        <button id="restart-btn" onclick="resetGame()"><i class="fa-solid fa-rotate-right"></i> Reset Practice</button>
    </div>

    <script>
        let wordsList = [];
        let isStarted = false;
        let activeWordIdx = 0;
        let activeCharIdx = 0;
        let startTime = null;
        let timerInterval = null;
        let correctChars = 0;
        let wordsCompleted = 0;

        const container = document.getElementById('word-container');
        const wpmDisplay = document.getElementById('wpm-val');
        const wordDisplay = document.getElementById('word-val');

        async function initPractice() {
            try {
                // Fetching the common wordlist as default for practice
                const resp = await fetch('/data/json/wordlistcommon.json');
                if (!resp.ok) throw new Error("Wordlist not found");
                wordsList = await resp.json();
                resetGame();
            } catch (err) {
                console.error(err);
                document.getElementById('live-stat').innerText = "Error loading practice words";
            }
        }

        function generateWords(count = 100) {
            const shuffled = [...wordsList].sort(() => Math.random() - 0.5).slice(0, count);
            return shuffled.map((w, i) => `
                <span class="word">
                    ${w.split('').map(c => `<span class="letter">${c}</span>`).join('')}
                </span>
            `).join('');
        }

        function resetGame() {
            clearInterval(timerInterval);
            isStarted = false;
            activeWordIdx = 0;
            activeCharIdx = 0;
            correctChars = 0;
            wordsCompleted = 0;
            startTime = null;
            container.style.top = "0px";
            
            wpmDisplay.innerText = "0";
            wordDisplay.innerText = "0";

            container.innerHTML = generateWords(100);
            container.querySelectorAll('.word')[0].classList.add('active');
        }

        function updateStats() {
            if (!startTime) return;
            const durationMinutes = (Date.now() - startTime) / 60000;
            const wpm = Math.round((correctChars / 5) / durationMinutes) || 0;
            wpmDisplay.innerText = wpm;
            wordDisplay.innerText = wordsCompleted;
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') { // Quick reset with Tab
                e.preventDefault();
                resetGame();
                return;
            }

            if(e.key === ' ') e.preventDefault();

            if (!isStarted && e.key.length === 1) {
                isStarted = true;
                startTime = Date.now();
                timerInterval = setInterval(updateStats, 1000);
            }

            const words = container.querySelectorAll('.word');
            const currentWord = words[activeWordIdx];
            if (!currentWord) return;
            const letters = currentWord.querySelectorAll('.letter');

            if (e.key === 'Backspace') {
                if (activeCharIdx > 0) {
                    activeCharIdx--;
                    letters[activeCharIdx].className = 'letter';
                }
            } else if (e.key === ' ') {
                if (activeCharIdx > 0) {
                    currentWord.classList.remove('active');
                    activeWordIdx++;
                    activeCharIdx = 0;
                    wordsCompleted++;
                    
                    if (activeWordIdx < words.length) {
                        const nextWord = words[activeWordIdx];
                        nextWord.classList.add('active');
                        handleScroll(nextWord);
                    }

                    // Infinite logic: If we are nearing the end of the rendered list, add more
                    if (activeWordIdx > words.length - 10) {
                        container.innerHTML += generateWords(50);
                    }
                    updateStats();
                }
            } else if (e.key.length === 1) {
                if (activeCharIdx < letters.length) {
                    if (e.key === letters[activeCharIdx].innerText) {
                        letters[activeCharIdx].classList.add('correct');
                        correctChars++;
                    } else {
                        letters[activeCharIdx].classList.add('incorrect');
                    }
                    activeCharIdx++;
                }
            }
        });

        function handleScroll(activeWord) {
            const offset = activeWord.offsetTop;
            if (offset > 40) {
                container.style.top = `-${offset}px`;
            }
        }

        initPractice();
    </script>
</body>
</html>
