<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeDoType | Settings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #121213; 
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 500px;
            padding: 2rem;
        }

        .gear-icon {
            font-size: 4rem;
            color: #3b82f6;
            margin-bottom: 1.5rem;
            animation: spin 5s linear infinite;;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin: 0;
            letter-spacing: -0.02em;
        }

        .wip-badge {
            display: inline-block;
            margin-top: 1rem;
            padding: 6px 14px;
            background: #1e1e1f;
            color: #3b82f6;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border: 1px solid rgba(255,255,255,0.05);
        }

        p {
            color: #565656;
            line-height: 1.6;
            margin-top: 1.5rem;
            font-size: 1.1rem;
        }

        .theme-preview {
            margin-top: 2rem;
            display: flex;
            gap: 10px;
            justify-content: center;
            opacity: 0.5; /* Faded because it's WIP */
        }

        .dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #1e1e1f;
        }
    </style>
</head>
<body>

    <div class="container">
        <i class="fa-solid fa-gear gear-icon"></i>
        <h1>Settings</h1>
        <div class="wip-badge">Work in Progress</div>
        
        <p>
            Custom themes are coming soon to MeDoType, along with keyboard sounds!
        </p>

        <div class="theme-preview">
            <div class="dot" style="background: #3b82f6;"></div>
            <div class="dot" style="background: #f5e076;"></div>
            <div class="dot" style="background: #e11d48;"></div>
            <div class="dot" style="background: #10b981;"></div>
        </div>
    </div>

    <script>

        (function() {
            const savedTheme = localStorage.getItem('user-theme');
            if (savedTheme === 'theme-carbon') {
                document.querySelector('.gear-icon').style.color = '#f5e076';
            } else if (savedTheme === 'theme-sakura') {
                document.querySelector('.gear-icon').style.color = '#e11d48';
            }
        })();
    </script>
</body>
</html>
