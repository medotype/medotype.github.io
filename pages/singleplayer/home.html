<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeDoType | Singleplayer</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../data/css/root.css">
    <script src="../../data/js/theme.js"></script>
    <style>
        body { background-color: var(--bg); color: var(--text-bright); font-family: var(--font); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #app { width: 100%; max-width: 850px; text-align: center; padding: 2rem; position: relative; }
        
        #nav { margin-bottom: 3rem; display: inline-flex; background: var(--card-bg); padding: 6px; border-radius: 12px; gap: 5px; }
        
        /* Stats Header (Timer & Combo) */
        .header-stats { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 600px; margin: 0 auto 1.5rem auto; height: 2rem; }
        #live-stat { font-size: 1.2rem; font-weight: 300; color: var(--text-faded); }
        #combo-stat { font-size: 1.2rem; font-weight: 600; color: var(--accent); opacity: 0; transition: opacity 0.3s, transform 0.1s; }
        #combo-stat.visible { opacity: 1; }
        #combo-stat.broken { color: var(--error); transform: translateX(-5px); }

        #typing-viewport { height: 90px; overflow: hidden; position: relative; margin-bottom: 2rem; }
        #word-container { display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; align-items: center; position: relative; top: 0; transition: top 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .word { font-size: 2rem; font-weight: 400; color: var(--text-faded); letter-spacing: -0.02em; position: relative; }
        .word.active::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 100%; height: 2px; background: var(--accent); border-radius: 2px; opacity: 0.3; }
        
        .letter { position: relative; }
        .letter.correct { color: var(--text-bright); }
        .letter.incorrect { color: var(--error); border-bottom: 2px solid var(--error); }
        
        /* The Caret (Cursor) */
        .letter.active-char::before {
            content: ''; position: absolute; left: -1px; top: 10%; height: 80%; width: 2px;
            background-color: var(--accent); animation: blink 1s infinite; border-radius: 2px;
        }
        .word.active-end::after {
            content: ''; position: absolute; right: -6px; top: 10%; height: 80%; width: 2px;
            background-color: var(--accent); animation: blink 1s infinite; border-radius: 2px;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        
        #results-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card-bg); padding: 3rem; border-radius: 24px; width: 100%; max-width: 400px; display: none; box-shadow: 0 20px 40px rgba(0,0,0,0.4); z-index: 10; }
        .stat-val { font-size: 4rem; font-weight: 600; color: var(--accent); margin: 0; }
        .stat-label { color: var(--text-faded); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.1em; }
        
        #restart-btn { margin-top: 2rem; background: var(--accent); color: white; border: none; padding: 12px 30px; border-radius: 10px; font-family: var(--font); font-weight: 600; cursor: pointer; width: 100%; transition: 0.2s; }
        #restart-btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .hidden { visibility: hidden; opacity: 0; }

        .mode-settings-container { display: flex; justify-content: center; margin-bottom: 3rem; animation: fadeIn 0.5s ease; }
        .mode-group { display: flex; background: var(--card-bg); padding: 4px; border-radius: 10px; gap: 2px; }
        .mode-item { padding: 8px 16px; font-size: 0.85rem; font-weight: 600; color: var(--text-faded); cursor: pointer; border-radius: 8px; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; gap: 8px; }
        .mode-item:hover { color: var(--text-bright); }
        .mode-item.active { color: var(--accent); background: rgba(255, 255, 255, 0.03); }
        .mode-item.blitz-active { color: #ff4500; text-shadow: 0 0 10px rgba(255, 69, 0, 0.3); }
        .mode-item i { font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="app">
        <div class="mode-settings-container">
            <div class="mode-group" id="mode-nav"></div>
        </div>
        
        <div class="header-stats">
            <div id="live-stat">Loading modes...</div>
            <div id="combo-stat"><i class="fa-solid fa-fire"></i> <span id="combo-val">0</span></div>
        </div>

        <div id="typing-viewport">
            <div id="word-container"></div>
        </div>

        <div id="results-screen">
            <p class="stat-label">Words Per Minute</p>
            <h1 class="stat-val" id="wpm-display">0</h1>
            <p class="stat-label" id="acc-display" style="margin-top: 10px;">Acc: 0%</p>
            <button id="restart-btn" onclick="resetGame()">Restart</button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://tzaowqeofmwfnprrfwat.supabase.co';
        const SB_KEY = 'sb_publishable_Sr33ux9FL6QZaJlfhjoqFw_tIwQhSbx';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let availableModes = [];
        let activeModeConfig = null;
        let wordsList = [];

        let isStarted = false;
        let activeWordIdx = 0;
        let activeCharIdx = 0;
        let startTime = null;
        let timerInterval = null;
        let correctChars = 0;
        let totalKeystrokes = 0;
        
        // Anti-Cheat & Combo Trackers
        let keyPressTimestamps = [];
        let currentCombo = 0;

        const container = document.getElementById('word-container');
        const liveStat = document.getElementById('live-stat');
        const comboStat = document.getElementById('combo-stat');
        const comboVal = document.getElementById('combo-val');
        const results = document.getElementById('results-screen');

        window.addEventListener('click', function(e) {
            const select = document.getElementById('custom-select');
            if (select && !select.contains(e.target)) select.classList.remove('open');
        });

        async function initModes() {
            try {
                const response = await fetch('../../data/json/modelist.json');
                if(!response.ok) throw new Error("File not found");
                availableModes = await response.json();
                buildNav();
                if (availableModes.length > 0) selectMode(availableModes[0]);
            } catch (e) {
                console.error(e);
                liveStat.innerText = "Error loading modes";
            }
        }

        function buildNav() {
            const nav = document.getElementById('mode-nav');
            nav.innerHTML = '';
            availableModes.forEach(mode => {
                const div = document.createElement('div');
                div.className = 'mode-item';
                div.id = `mode-${mode.id}`;
                let iconClass = mode.type === 'time' ? 'fa-clock' : 'fa-font';
                if (mode.id === 'blitz') iconClass = 'fa-fire';
                div.innerHTML = `<i class="fa-solid ${iconClass}"></i> ${mode.label}`;
                div.onclick = () => selectMode(mode);
                nav.appendChild(div);
            });
        }

        async function selectMode(mode) {
            activeModeConfig = mode;
            document.querySelectorAll('.mode-item').forEach(el => el.classList.remove('active', 'blitz-active'));
            const activeEl = document.getElementById(`mode-${mode.id}`);
            if (activeEl) {
                activeEl.classList.add(mode.id === 'blitz' ? 'blitz-active' : 'active');
            }

            try {
                let rawPath = mode.wordpool || '/data/json/wordlistcommon.json';
                let safeUrl = rawPath.includes('data/') ? '/data/' + rawPath.split('data/')[1] : 
                              (!rawPath.startsWith('/') && !rawPath.startsWith('http') ? '/' + rawPath : rawPath);

                const resp = await fetch(safeUrl);
                if (!resp.ok) throw new Error(`HTTP error! status: ${resp.status}`);
                wordsList = await resp.json();
                if (Array.isArray(wordsList) && wordsList.length > 0) resetGame(); 
                else throw new Error("Wordlist is empty");
            } catch (err) {
                console.error("Failed to load words:", err);
                liveStat.innerText = "Error loading words";
            }
        }

        function updateCaret() {
            document.querySelectorAll('.active-char, .active-end').forEach(el => el.classList.remove('active-char', 'active-end'));
            const words = container.querySelectorAll('.word');
            if(activeWordIdx >= words.length) return;
            
            const currentWord = words[activeWordIdx];
            const letters = currentWord.querySelectorAll('.letter');
            
            if (activeCharIdx < letters.length) {
                letters[activeCharIdx].classList.add('active-char');
            } else {
                currentWord.classList.add('active-end');
            }
        }

        function updateCombo(reset = false) {
            if (reset) {
                currentCombo = 0;
                comboStat.classList.add('broken');
                setTimeout(() => comboStat.classList.remove('broken'), 200);
            } else {
                currentCombo++;
            }
            comboVal.innerText = currentCombo;
            
            // Pulse effect every 10 combo
            if (currentCombo > 0 && currentCombo % 10 === 0) {
                comboStat.style.transform = "scale(1.2)";
                setTimeout(() => comboStat.style.transform = "scale(1)", 150);
            }
        }

        function resetGame() {
            clearInterval(timerInterval);
            isStarted = false;
            activeWordIdx = 0;
            activeCharIdx = 0;
            correctChars = 0;
            totalKeystrokes = 0;
            startTime = null;
            
            // Reset trackers
            keyPressTimestamps = [];
            currentCombo = 0;
            comboVal.innerText = "0";
            comboStat.classList.remove('visible');

            container.style.top = "0px";
            results.style.display = 'none';
            container.classList.remove('hidden');
            
            if (activeModeConfig.type === 'time') liveStat.innerText = activeModeConfig.value;
            else liveStat.innerText = `0 / ${activeModeConfig.value}`;

            if (!wordsList || wordsList.length === 0) return;

            const count = activeModeConfig.renderCount || 50;
            const shuffled = [...wordsList].sort(() => Math.random() - 0.5).slice(0, count);
            
            container.innerHTML = shuffled.map((w, i) => `
                <span class="word ${i === 0 ? 'active' : ''}">
                    ${w.split('').map(c => `<span class="letter">${c}</span>`).join('')}
                </span>
            `).join('');

            updateCaret();
        }

        window.addEventListener('keydown', (e) => {
            if (results.style.display === 'block' || !activeModeConfig || (isStarted && !startTime)) return;
            
            // Ignore system keys (Shift, Ctrl, Alt, etc.) to not break the combo
            if (e.key.length !== 1 && e.key !== 'Backspace' && e.key !== ' ') return;
            if (e.key === ' ') e.preventDefault();

            if (!isStarted && e.key.length === 1) {
                isStarted = true;
                startTime = Date.now();
                comboStat.classList.add('visible');
                if (activeModeConfig.type === 'time') startTimer();
            }

            const words = container.querySelectorAll('.word');
            const currentWord = words[activeWordIdx];
            if (!currentWord) return;
            const letters = currentWord.querySelectorAll('.letter');

            if (e.key === 'Backspace') {
                if (activeCharIdx > 0) {
                    activeCharIdx--;
                    letters[activeCharIdx].className = 'letter';
                } else if (activeWordIdx > 0) {
                    currentWord.classList.remove('active');
                    activeWordIdx--;
                    const prevWord = words[activeWordIdx];
                    prevWord.classList.add('active');
                    const prevLetters = prevWord.querySelectorAll('.letter');
                    activeCharIdx = prevLetters.length;
                    handleScroll(prevWord);
                    if (activeModeConfig.type === 'words') liveStat.innerText = `${activeWordIdx} / ${activeModeConfig.value}`;
                }
            } else if (e.key === ' ') {
                if (activeCharIdx > 0) {
                    if (activeModeConfig.type === 'words' && activeWordIdx + 1 >= activeModeConfig.value) {
                        finish(); return;
                    }
                    currentWord.classList.remove('active');
                    activeWordIdx++;
                    activeCharIdx = 0;
                    
                    if (activeWordIdx < words.length) {
                        const nextWord = words[activeWordIdx];
                        nextWord.classList.add('active');
                        handleScroll(nextWord);
                    }
                    
                    if (activeModeConfig.type === 'words') liveStat.innerText = `${activeWordIdx} / ${activeModeConfig.value}`;
                }
            } else if (e.key.length === 1) {
                if (activeCharIdx < letters.length) {
                    totalKeystrokes++;
                    keyPressTimestamps.push(Date.now()); // Record for anti-cheat
                    
                    if (e.key === letters[activeCharIdx].innerText) {
                        letters[activeCharIdx].classList.add('correct');
                        correctChars++;
                        updateCombo(false);
                    } else {
                        letters[activeCharIdx].classList.add('incorrect');
                        updateCombo(true); // Break combo
                    }
                    activeCharIdx++;

                    if (activeModeConfig.type === 'words' && activeWordIdx === activeModeConfig.value - 1 && activeCharIdx === letters.length) {
                        finish();
                        return;
                    }
                }
            }
            
            updateCaret();
        });

        function handleScroll(activeWord) {
            const offset = activeWord.offsetTop;
            if (offset > 40) container.style.top = `-${offset}px`;
        }

        function startTimer() {
            let left = activeModeConfig.value;
            timerInterval = setInterval(() => {
                left--;
                liveStat.innerText = left;
                if (left <= 0) finish();
            }, 1000);
        }

        async function finish() {
            clearInterval(timerInterval);
            const durationMinutes = (Date.now() - startTime) / 60000;
            const wpm = Math.round((correctChars / 5) / durationMinutes) || 0;
            const acc = totalKeystrokes > 0 ? Math.round((correctChars / totalKeystrokes) * 100) : 0;

            let saved = false;
            const { data: { session } } = await _supabase.auth.getSession();

            // --- ANTI-CHEAT CALCULATION ---
            let isBot = false;
            if (keyPressTimestamps.length > 10) {
                let intervals = [];
                for (let i = 1; i < keyPressTimestamps.length; i++) {
                    intervals.push(keyPressTimestamps[i] - keyPressTimestamps[i - 1]);
                }
                let sum = intervals.reduce((a, b) => a + b, 0);
                let avg = sum / intervals.length;
                let variance = intervals.reduce((a, b) => a + Math.pow(b - avg, 2), 0) / intervals.length;
                let stdDev = Math.sqrt(variance);

                // If deviation is too perfect (under 5ms) or typing impossibly fast (300+ wpm)
                if (stdDev < 5 || wpm > 300) {
                    console.warn("Anti-Cheat: Suspicious typing rhythm or speed detected.");
                    isBot = true;
                }
            }

            const isWorthyScore = wpm >= 10 && acc >= 50;

            if (session && isWorthyScore && !isBot) {
                const { error } = await _supabase
                    .from('scores')
                    .insert([{ 
                        user_id: session.user.id, 
                        wpm: wpm, 
                        accuracy: acc, 
                        mode: activeModeConfig.id
                    }]);
                if (!error) saved = true;
            }

            window.location.href = `results.html?wpm=${wpm}&acc=${acc}&mode=${activeModeConfig.id}&saved=${saved}`;
        }

        initModes();
    </script>
</body>
</html>
